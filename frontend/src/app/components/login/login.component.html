<div class="split-container">
  <!-- Left Side: Illustration -->
  <div class="illustration-side">
    <img src="https://cdni.iconscout.com/illustration/premium/thumb/user-login-4268415-3551762.png" alt="Login Illustration" class="login-image">
  </div>

  <!-- Right Side: Login Form -->
  <div class="form-side">
    <div class="form-wrapper">
      <h2>Faculty & Admin Login</h2>
      <p class="subtitle">Hey enter your details to sign in to your account</p>

      <form (ngSubmit)="login()">
        <div class="input-group">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="username" name="username" [(ngModel)]="user.username" placeholder="Enter your username/email" required>
        </div>
        
        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="password" name="password" [(ngModel)]="user.password" placeholder="Enter your password" required>
        </div>

        <p class="trouble-text">Having trouble in sign in?</p>

        <button type="submit" class="btn-login">Login In</button>
      </form>
      
      <p class="register-text">
        Don't have an account? <a routerLink="/register">Signup Now</a>
      </p>
    </div>
  </div>
</div>
